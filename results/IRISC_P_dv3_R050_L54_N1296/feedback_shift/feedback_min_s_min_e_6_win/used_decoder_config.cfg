
code = IRISC_P_dv3_R050_L54_N1296

decoder_type = feedback_shift

# Optional extra results subfolder under results/<code>/feedback_shift/
# Example: results_experiment_name = exp_feedback_dv4_seed42
results_experiment_name = feedback_min_s_min_e_6_win

# Syndrome scope:
#   0 = include parity bits too (classical+quantum syndrome scope)
#   1 = use information bits only (quantum-only syndrome scope, G encoding)
syndrome_includes_parity_bits = 0

feedback_trigger_iter = 9
feedback_mask_window_iters = 6

# min/max row selection mode
feedback_row_selection_mode = min

# Target column after the max-energy anchor:
#   next       = first next participating column after anchor (current default)
#   min_energy = participating column after anchor with minimum current column-block energy
feedback_target_column_mode = min_energy


feedback_logs_enabled = 0

