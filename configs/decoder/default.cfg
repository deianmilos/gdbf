# Decoder runtime configuration (key=value)
# ------------------------------------------------------------------
# Common parameters (used by all decoder types)
# ------------------------------------------------------------------
# LDPC code folder name under codes/
code = IRISC_P_dv3_R050_L54_N1296

# Select active decoder mode:
#   gdbf | pgdbf | ml | feedback_shift
decoder_type = feedback_shift

# Candidate strategy (used by ML/data-collection paths)
#   topk | graph | max_energy_checks
candidate_selection = topk

# Label generation strategy (collect mode only)
#   ground_truth | rollout
labeling_strategy = ground_truth

# Feature set (ML/collect path)
#   basic | basic_plus_impact
feature_set = basic_plus_impact

# Optional exact feature override (comma-separated).
# Available names: energy,mismatch,unsat,flip_impact,flip_count
# feature_list = energy,mismatch,unsat,flip_impact,flip_count

# Number of candidates K (ML/collect path)
candidate_k = 6

# Data collection toggle (all modes)
#   0/1 (or false/true)
collect = 0

# Rollout settings (collect + rollout labeling)
rollout_iters = 3

# ------------------------------------------------------------------
# Baseline decoder controls (gdbf/pgdbf and shared core behavior)
# ------------------------------------------------------------------
pgdbf_flip_probability = 0.70
allowed_worsening = 4

# ------------------------------------------------------------------
# feedback_shift controls (used only when decoder_type=feedback_shift)
# ------------------------------------------------------------------
feedback_trigger_iter = 10
# Number of receiver iterations to run with the sender-provided feedback mask
feedback_mask_window_iters = 4
# Maximum absolute sender shift delta evaluated per candidate (tests -d..-1,+1..+d)
# feedback_delta_max = 3
# Number of top problematic rows (by receiver priority) to request per feedback round
# Set to 1 to focus only on the single most problematic row
feedback_target_rows = 1
# Row ranking is severity-only (rows with more violated checks are prioritized first).
# feedback_row_selection_mode: max = rows with most violated checks first (default)
#                              min = rows with fewest violated checks first (least broken)
feedback_row_selection_mode = min
# Shift source mode for selected target column:
#   fixed  = sat-check guided with deterministic fallback (current behavior)
#   random = random non-zero delta, ignores satisfied-check reference values
feedback_shift_source_mode = fixed
# Enable detailed feedback-shift sender/receiver logs (0/1)
feedback_logs_enabled = 0

# ------------------------------------------------------------------
# ML controls (used only when decoder_type=ml)
# ------------------------------------------------------------------
# Invoke ML only if baseline continuation from the same stuck state would fail (0/1)
ml_invoke_only_if_baseline_fails = 1

# Stagnation detection (used to define "stuck" states)
energy_hist_len = 8
stagnation_trigger = 1
oscillation_trigger = 3
