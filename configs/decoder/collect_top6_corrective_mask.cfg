# Alias of collect_top6_ground_truth.cfg with a clearer name.
# This profile collects 16-bit neighborhoods with corrective-mask labels.

# LDPC code folder name under codes/
code = IRISC_P_dv3_R050_L54_N1296

# Collection rows are written from the ML round, so the decoder must use ML trigger handling.
decoder_type = ml

# Candidate strategy
#   max_energy_checks
candidate_selection = max_energy_checks

# Collected rows use corrective-mask labels over the selected candidates

# Feature set: basic | basic_plus_impact
feature_set = basic_plus_impact

# Optional exact feature override (comma-separated).
feature_list = energy,flip_impact,flip_count

# Fixed neighborhood width: 1 max-energy anchor + VN neighbors from its checks
# collected labels remain aligned with these 16 candidate slots
candidate_k = 16

# Enable dataset collection
collect = 1

# Reactive collection trigger
ml_trigger_mode = state_based
ml_periodic_interval = 0
ml_start_after_stuck = 0
ml_invoke_only_if_baseline_fails = 0

# Decoder behavior
pgdbf_flip_probability = 0.70
allowed_worsening = 4

# Stagnation detection
energy_hist_len = 8
stagnation_trigger = 3
oscillation_trigger = 5

