# ML-only data collection configuration (collect = 1)
# Decoder generates training data by triggering ML reactively on stagnation/oscillation

# ------------------------------------------------------------------
# Core controls
# ------------------------------------------------------------------
code = IRISC_P_dv3_R050_L54_N1296
decoder_type = ml
collect = 1

# Baseline control
pgdbf_flip_probability = 0.70
allowed_worsening = 4

# ------------------------------------------------------------------
# ML TRIGGERING: STATE-BASED (REACTIVE)
# ML runs whenever stagnation or oscillation is detected
# Can trigger multiple times per frame as decoder gets stuck again
# ------------------------------------------------------------------
ml_trigger_mode = state_based
ml_periodic_interval = 0

# Optional: warmup mode (applies only to periodic triggers)
# For state_based mode, ML always triggers immediately when stuck
ml_start_after_stuck = 0

# Stagnation/oscillation detection thresholds
# Used when ml_trigger_mode = state_based
energy_hist_len = 8
stagnation_trigger = 2
oscillation_trigger = 6

# ------------------------------------------------------------------
# ML contract (features and candidates)
# ------------------------------------------------------------------
candidate_selection = max_energy_checks
candidate_k = 16
feature_list = energy,flip_impact,flip_count

# ------------------------------------------------------------------
# Invocation policy
# ------------------------------------------------------------------
ml_invoke_only_if_baseline_fails = 0
ml_max_energy_seed_mode = single

# ------------------------------------------------------------------
# Data collection (labeling strategy)
# ------------------------------------------------------------------
labeling_strategy = corrective_mask
rollout_iters = 100
rollout_target_flip_count = 0
