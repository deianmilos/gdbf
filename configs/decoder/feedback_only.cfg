# Feedback-only mode: feedback_shift without ML rounds.
# Flag legend:
#   [BOTH]      used by both data collection and inference runs
#   [COLLECT]   used only when collect=1 (dataset generation)
#   [INFER]     used only when collect=0 (runtime decoding)
#   [ENHANCED]  used only by enhanced decoders (ml / feedback_shift)

# ------------------------------------------------------------------
# 1) Core run mode and shared controls
# ------------------------------------------------------------------
# [BOTH] Code under codes/
code = IRISC_P_dv3_R050_L54_N1296

# [BOTH] Pure feedback decoder path
decoder_type = feedback_shift

# [BOTH] Collection toggle (0 = inference-only run)
collect = 0

# [BOTH] Shared baseline control
pgdbf_flip_probability = 0.70

# ------------------------------------------------------------------
# 2) Data-collection-only controls
# ------------------------------------------------------------------
# [COLLECT] None in this config (feedback-only inference profile)

# ------------------------------------------------------------------
# 3) Inference-only controls
# ------------------------------------------------------------------
# [INFER][ENHANCED] Feedback-shift trigger controls
feedback_trigger_iter = 15
feedback_mask_window_iters = 10

# [INFER][ENHANCED] Row ranking and shift-source behavior
# feedback_row_selection_mode: max = most violated first, min = least non-zero violated first
feedback_row_selection_mode = min

# [INFER][ENHANCED] feedback_shift_source_mode: fixed | random | fixed_number
feedback_shift_source_mode = random

# [INFER][ENHANCED] Used when feedback_shift_source_mode=fixed_number
feedback_shift_fixed_delta = 2

# [INFER][ENHANCED] 1 = continue from current state, 0 = restart from received word after feedback apply
feedback_continue_from_current = 0

# [INFER][ENHANCED] Detailed sender/receiver logs (0/1)
feedback_logs_enabled = 0
