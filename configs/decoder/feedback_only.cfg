# Feedback-only mode: feedback_shift without ML rounds.

# Code under codes/
code = IRISC_P_dv3_R050_L54_N1296

# Pure feedback decoder path.
decoder_type = feedback_shift
collect = 0

# Shared baseline control.
pgdbf_flip_probability = 0.70

# Feedback-shift controls.
feedback_trigger_iter = 15
feedback_mask_window_iters = 10

# Row ranking and shift-source behavior.
# feedback_row_selection_mode: max = most violated first, min = least non-zero violated first
feedback_row_selection_mode = min
# feedback_shift_source_mode: fixed | random | fixed_number
feedback_shift_source_mode = random
# used when feedback_shift_source_mode=fixed_number
feedback_shift_fixed_delta = 2

feedback_logs_enabled = 0
