################################################################################
#                                                                              #
#  ML DECODER UNIFIED CONFIGURATION - All Variants in One File               #
#                                                                              #
#  This single config file contains all ML triggering variants. Simply        #
#  uncomment the desired variant section below to switch between them.        #
#                                                                              #
################################################################################

# ------------------------------------------------------------------
# CORE SETTINGS (same for all variants)
# ------------------------------------------------------------------
code = IRISC_P_dv3_R050_L54_N1296
decoder_type = ml
collect = 0

# Baseline control
pgdbf_flip_probability = 1.0
allowed_worsening = 100

# ML contract (features and candidates)
candidate_selection = max_energy_checks
candidate_k = 16
feature_list = energy,flip_impact,flip_count

# Invocation policy
ml_invoke_only_if_baseline_fails = 0 # allow ML to trigger based on its own logic
ml_max_energy_seed_mode = all

################################################################################
#                                                                              #
#  VARIANT SELECTION - Choose ONE section below                              #
#                                                                              #
#  Uncomment all lines in your desired variant, comment out others.          #
#  Each variant shows its specific trigger configuration.                    #
#                                                                              #
################################################################################

# ==============================================================================
# VARIANT 1: PERIODIC ML (Fixed Schedule - Early Start)
# ==============================================================================
# Description:
#   ML triggers at FIXED INTERVALS from the very beginning of decoding.
#   Useful when: you want predictable ML invocation every N iterations.
#   Trade-off: wastes ML on easy frames that baseline could solve alone.
#   Best for: problems where most frames need ML help early.
#
# Configuration:
#   ml_trigger_mode = periodic          (fixed interval mode)
#   ml_periodic_interval = 3            (trigger every 3 iterations)
#   ml_start_after_stuck = 0            (start immediately, don't wait)
#
# Example timeline:
#   Iteration 0 â†’ no ML
#   Iteration 1 â†’ no ML
#   Iteration 2 â†’ ML triggered (3rd iteration)
#   Iteration 3 â†’ no ML
#   Iteration 4 â†’ no ML
#   Iteration 5 â†’ ML triggered (6th iteration)
#   ...
# ==============================================================================

ml_trigger_mode = periodic
ml_periodic_interval = 3
ml_start_after_stuck = 0


# ==============================================================================
# VARIANT 2: PERIODIC ML WITH WARMUP (Fixed Schedule - Delayed Start)
# ==============================================================================
# Description:
#   ML triggers at FIXED INTERVALS, but ONLY AFTER the decoder gets stuck.
#   Useful when: you want baseline to solve easy frames alone, ML helps hard ones.
#   Trade-off: adds latency identifying stuck state, but saves ML on easy frames.
#   Best for: mixed difficulty problems where some frames don't need ML.
#
# Configuration:
#   ml_trigger_mode = periodic          (fixed interval mode)
#   ml_periodic_interval = 3            (trigger every 3 iterations after warmup)
#   ml_start_after_stuck = 1            (wait for first stuck state before starting)
#
# Example timeline (assuming stuck detected at iteration 5):
#   Iteration 0-4 â†’ no ML (baseline runs freely)
#   Iteration 4 â†’ stuck state detected
#   Iteration 5 â†’ ML triggered (first interval after stuck)
#   Iteration 6 â†’ no ML
#   Iteration 7 â†’ no ML
#   Iteration 8 â†’ ML triggered (6 iterations from stuck)
#   ...
# ==============================================================================

# UNCOMMENT TO USE VARIANT 2 (comment out Variant 1 above):
# ml_trigger_mode = periodic
# ml_periodic_interval = 3
# ml_start_after_stuck = 1

# energy_hist_len = 8
# stagnation_trigger = 2
# oscillation_trigger = 6


# ==============================================================================
# VARIANT 3: STATE-BASED / REACTIVE (Adaptive - Respond to Stuck)
# ==============================================================================
# Description:
#   ML triggers REACTIVELY whenever stagnation/oscillation is detected.
#   Supports MULTIPLE TRIGGERS PER FRAME as decoder gets stuck again.
#   Useful when: you want adaptive behavior that reacts to stuck states.
#   Trade-off: no fixed schedule, triggers depend on energy/syndrome state.
#   Best for: fully adaptive decoding where ML intervention matches stuck detection.
#
# Configuration:
#   ml_trigger_mode = state_based       (reactive mode)
#   ml_periodic_interval = 0            (ignored, use state counters instead)
#   ml_start_after_stuck = 0            (irrelevant for state_based, always reactive)
#
# Trigger thresholds (state_based specific):
#   stagnation_trigger = 2              (ML when energy stalls 2+ iterations)
#   oscillation_trigger = 6             (ML when syndrome oscillates 6+ times)
#   energy_hist_len = 3                 (window for stagnation detection)
#
# Example timeline:
#   Iteration 0 â†’ energy changes, no trigger
#   Iteration 1 â†’ energy stalls 1x
#   Iteration 2 â†’ energy stalls 2x â†’ ML triggered (stagnation_trigger met)
#   Iteration 3 â†’ energy changes, stagnation counter resets
#   Iteration 4 â†’ syndrome oscillates 1x
#   ...
#   Iteration 9 â†’ syndrome oscillates 6x â†’ ML triggered (oscillation_trigger met)
# ==============================================================================

# UNCOMMENT TO USE VARIANT 3 (comment out Variants 1-2 above):
# ml_trigger_mode = state_based
# ml_periodic_interval = 0
# ml_start_after_stuck = 0

# energy_hist_len = 3
# stagnation_trigger = 1
# oscillation_trigger = 1


# ==============================================================================
# VARIANT 4: STATE-BASED CONSERVATIVE (Adaptive - Stricter Detection)
# ==============================================================================
# Description:
#   ML triggers reactively, but with STRICTER thresholds.
#   Waits longer before triggering to reduce false positives.
#   Useful when: you want to be conservative with ML calls.
#   Trade-off: slower reaction to actual stuck states.
#   Best for: high-cost ML inference where you minimize invocations.
#
# Configuration:
#   ml_trigger_mode = state_based
#   ml_periodic_interval = 0
#   ml_start_after_stuck = 0
#
# Stricter thresholds:
#   stagnation_trigger = 5              (must stall 5+ iterations, not 2)
#   oscillation_trigger = 10            (must oscillate 10+ times, not 6)
#   energy_hist_len = 8                 (longer history window)
# ==============================================================================

# UNCOMMENT TO USE VARIANT 4 (comment out Variants 1-3 above):
# ml_trigger_mode = state_based
# ml_periodic_interval = 0
# ml_start_after_stuck = 0

# energy_hist_len = 10
# stagnation_trigger = 2
# oscillation_trigger = 5


# ==============================================================================
# VARIANT 5: STATE-BASED AGGRESSIVE (Adaptive - Early Detection)
# ==============================================================================
# Description:
#   ML triggers reactively, with LOOSE thresholds for EARLY detection.
#   Triggers very quickly when any stuck indicator appears.
#   Useful when: you want aggressive ML intervention ASAP.
#   Trade-off: may trigger on false positives, higher ML overhead.
#   Best for: problems where early ML help significantly improves convergence.
#
# Configuration:
#   ml_trigger_mode = state_based
#   ml_periodic_interval = 0
#   ml_start_after_stuck = 0
#
# Aggressive thresholds:
#   stagnation_trigger = 1              (trigger after 1 iteration of stall)
#   oscillation_trigger = 3             (trigger after 3 oscillations)
#   energy_hist_len = 2                 (minimal history window)
# ==============================================================================

# UNCOMMENT TO USE VARIANT 5 (comment out Variants 1-4 above):
# ml_trigger_mode = state_based
# ml_periodic_interval = 0
# ml_start_after_stuck = 0

# energy_hist_len = 2
# stagnation_trigger = 1
# oscillation_trigger = 3


################################################################################
#                                                                              #
#  QUICK REFERENCE - Parameter Meanings                                       #
#                                                                              #
#  ml_trigger_mode:
#    - periodic     : Fixed-interval triggers (every N iterations)
#    - state_based  : Adaptive triggers (based on stagnation/oscillation)
#    - none         : ML disabled (baseline only)
#
#  ml_periodic_interval:
#    - Used for: ml_trigger_mode = periodic
#    - Value: N (trigger every N iterations, e.g., 3 = iterations 3,6,9,...)
#    - Ignored: when ml_trigger_mode = state_based
#
#  ml_start_after_stuck:
#    - 0 = no warmup (start immediately)
#    - 1 = warmup enabled (wait for first stuck detection before periodic starts)
#    - Only affects: ml_trigger_mode = periodic
#    - Ignored: when ml_trigger_mode = state_based (always reactive)
#
#  stagnation_trigger:
#    - Used for: ml_trigger_mode = state_based
#    - Value: N (trigger when energy stalls for N+ consecutive iterations)
#    - Lower = earlier detection (e.g., 1 = very aggressive, 5 = conservative)
#    - Ignored: when ml_trigger_mode = periodic
#
#  oscillation_trigger:
#    - Used for: ml_trigger_mode = state_based
#    - Value: N (trigger when syndrome bounces N+ times without progress)
#    - Lower = earlier detection (e.g., 3 = aggressive, 10 = conservative)
#    - Ignored: when ml_trigger_mode = periodic
#
#  energy_hist_len:
#    - Used for: ml_trigger_mode = state_based (history window size)
#    - Typical: 2-8 (smaller = faster response, larger = smoother)
#    - Ignored: when ml_trigger_mode = periodic
#
