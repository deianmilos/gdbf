# Code under codes/
code = IRISC_P_dv3_R050_L54_N1296

# Enable ML-assisted stuck-state escapes.
decoder_type = ml
collect = 0

# Keep candidate/feature contract identical to training data.
candidate_selection = max_energy_checks
candidate_k = 16
feature_list = energy,flip_impact,flip_count

# Collection labels are corrective-mask only.

# ML invocation policy:
# 1 => invoke ML only when baseline continuation would fail from same state.
# 0 => on each stuck event, call ML directly (no counterfactual baseline simulation).
ml_invoke_only_if_baseline_fails = 0

# Additional periodic ML trigger while frame is still not converged.
# 0 disables periodic triggering; 10 means run ML every 10 iterations.
ml_periodic_interval = 10

# Keep rollback guard for harmful ML actions.
allowed_worsening = 4

# Trigger ML on real stuck behavior (aligned with collection profile).
energy_hist_len = 8
stagnation_trigger = 3
oscillation_trigger = 6

# Shared baseline controls.
pgdbf_flip_probability = 0.70

