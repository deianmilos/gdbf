
code = IRISC_P_dv3_R050_L54_N1296

# Enable hybrid scheduler.
decoder_type = ml_feedback
collect = 0

# Optional extra results subfolder under results/<code>/<decoder_type>/
# Example: results_experiment_name = exp_ml_feedback_dv4_seed42
results_experiment_name = t

# Syndrome scope:
#   0 = use information bits only (quantum-only syndrome scope)
#   1 = include parity bits too (classical+quantum syndrome scope)
syndrome_includes_parity_bits = 0


ml_periodic_interval = 3
# max-energy seed handling: single (default) or all
ml_max_energy_seed_mode = all

# ML rollback guard.
allowed_worsening = 4

# Stagnation detection for stuck-triggered ML path.
energy_hist_len = 8
stagnation_trigger = 2
oscillation_trigger = 6

# Feedback-shift controls (secondary escalation path).
feedback_trigger_iter = 9
feedback_mask_window_iters = 4

# Severity-only row ranking, fixed participating column index (1-indexed).
# feedback_row_selection_mode: max = rows with most violated checks first (default)
#                              min = rows with fewest violated checks first
feedback_row_selection_mode = max
feedback_target_column_mode = min_e
# Shift proposal strategy is random-only in current runtime.

feedback_logs_enabled = 0

# Shared baseline controls.
pgdbf_flip_probability = 0.70

