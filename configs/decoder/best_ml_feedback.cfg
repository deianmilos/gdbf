# Hybrid mode: ML local escapes + feedback-shift supplementary equations.

# Code under codes/
code = IRISC_P_dv3_R050_L54_N1296

# Enable hybrid scheduler.
decoder_type = ml_feedback
collect = 0

# Keep candidate/feature contract identical to training data.
candidate_selection = max_energy_checks
candidate_k = 16
feature_list = energy,flip_impact,flip_count

# Labeling not used in inference when collect=0.
labeling_strategy = corrective_mask
rollout_iters = 100
rollout_target_flip_count = 0

# ML invocation policy.
ml_invoke_only_if_baseline_fails = 0
ml_periodic_interval = 5

# ML rollback guard.
allowed_worsening = 4

# Stagnation detection for stuck-triggered ML path.
energy_hist_len = 8
stagnation_trigger = 2
oscillation_trigger = 6

# Feedback-shift controls (secondary escalation path).
feedback_trigger_iter = 15
feedback_mask_window_iters = 10

# Severity-only row ranking, fixed participating column index (1-indexed).
# feedback_row_selection_mode: max = rows with most violated checks first (default)
#                              min = rows with fewest violated checks first
feedback_row_selection_mode = min
# Shift source mode for selected target column:
#   fixed  = current behavior (sat-check guided with deterministic fallback)
#   random = random non-zero delta, ignores satisfied-check reference values
feedback_shift_source_mode = random

feedback_logs_enabled = 0

# Shared baseline controls.
pgdbf_flip_probability = 0.70
