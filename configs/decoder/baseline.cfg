# Decoder runtime configuration (key=value)
# Flag legend:
#   [BOTH]      used by both data collection and inference runs
#   [COLLECT]   used only when collect=1 (dataset generation)
#   [INFER]     used only when collect=0 (runtime decoding)
#   [ENHANCED]  used only by enhanced decoders (ml / feedback_shift)

# ------------------------------------------------------------------
# 1) Core run mode and shared controls
# ------------------------------------------------------------------
# [BOTH] LDPC code folder name under codes/
code = IRISC_P_dv3_R050_L54_N1296

# [BOTH] Active decoder mode:
#   gdbf | pgdbf | ml | feedback_shift
decoder_type = gdbf

# [BOTH] Data collection toggle:
#   0/1 (or false/true)
collect = 0

# [BOTH] Shared baseline control (gdbf/pgdbf and shared perturbation logic)
pgdbf_flip_probability = 0.70
# [BOTH] Rollback guard / worsening tolerance
allowed_worsening = 4

# [BOTH][ENHANCED] Stagnation detection (trigger logic for enhanced behavior)
energy_hist_len = 8
stagnation_trigger = 1
oscillation_trigger = 3

# ------------------------------------------------------------------
# 2) ML candidate and feature contract
# ------------------------------------------------------------------
# [BOTH][ENHANCED] Candidate strategy (ML / collection paths)
#   topk | graph
candidate_selection = topk

# [BOTH][ENHANCED] Number of candidates K
candidate_k = 6

# [BOTH][ENHANCED] Feature preset
#   basic | basic_plus_impact
feature_set = basic_plus_impact

# [BOTH][ENHANCED] Optional exact feature override (comma-separated)
# Available names: energy,mismatch,unsat,flip_impact
# feature_list = energy,mismatch,unsat,flip_impact

# ------------------------------------------------------------------
# 3) Data-collection-only controls
# ------------------------------------------------------------------
# [COLLECT][ENHANCED] Label generation strategy (ignored when collect=0)
#   ground_truth | rollout
labeling_strategy = ground_truth

# [COLLECT][ENHANCED] Rollout depth used by rollout labeling
rollout_iters = 3

# ------------------------------------------------------------------
# 4) Inference-only controls (enhanced runtime behavior)
# ------------------------------------------------------------------
# [INFER][ENHANCED] Invoke ML only if baseline continuation from same stuck state fails (0/1)
ml_invoke_only_if_baseline_fails = 1

# ------------------------------------------------------------------
# 5) Enhanced decoder specific controls
# ------------------------------------------------------------------
# [INFER][ENHANCED] feedback_shift trigger iteration
feedback_trigger_iter = 15

# [INFER][ENHANCED] Enable detailed feedback-shift sender/receiver logs (0/1)
feedback_logs_enabled = 1
