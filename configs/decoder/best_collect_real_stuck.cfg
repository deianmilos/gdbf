# Best-practice profile for collecting ML escape data from real stuck states.
# Designed to match training/configs/top6_energy_bits.json expectations.

# Code under codes/
code = IRISC_P_dv3_R050_L54_N1296

# Use ML trigger handling for collection; collection rows are written from the ML round.
decoder_type = ml

# Fixed candidate neighborhood around the anchor candidate.
candidate_selection = max_energy_checks
candidate_k = 16

# Collect only; labels mark candidate bits that are currently wrong
# w.r.t. the true codeword and therefore should be flipped.
collect = 1
ml_trigger_mode = state_based
ml_periodic_interval = 0
ml_start_after_stuck = 0
ml_invoke_only_if_baseline_fails = 0
labeling_strategy = corrective_mask
rollout_iters = 20
# 0 => adaptive: choose the smallest flip count that escapes.
# >0 => force exactly that many flips during rollout label search.
rollout_target_flip_count = 0

# Keep features aligned with the current top6 training profile.
feature_list = energy,flip_impact,flip_count

# Shared baseline controls.
pgdbf_flip_probability = 0.70
allowed_worsening = 4

# Stricter stuck detection: collect harder/real stuck snapshots.
energy_hist_len = 8
stagnation_trigger = 3
oscillation_trigger = 6

# ML gate is not used for row collection; allow normal ML-round handling.
